<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>An Important Question 💖</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #ffe6f0, #fff0f5, #fce4ec);
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    .hearts-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .floating-heart {
      position: absolute;
      font-size: 1.5rem;
      animation: floatUp 6s ease-in infinite;
      opacity: 0;
    }

    @keyframes floatUp {
      0%   { transform: translateY(100vh) scale(0.5); opacity: 0; }
      10%  { opacity: 0.6; }
      90%  { opacity: 0.4; }
      100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
    }

    .card {
      position: relative;
      z-index: 1;
      background: white;
      border-radius: 24px;
      padding: 3rem 2.5rem;
      text-align: center;
      box-shadow: 0 20px 60px rgba(255, 100, 150, 0.2);
      max-width: 420px;
      width: 90%;
    }

    .bear {
      font-size: 5rem;
      margin-bottom: 0.5rem;
      display: block;
      animation: bounce 1.5s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }

    h1 {
      font-size: 1.6rem;
      color: #d63384;
      margin-bottom: 0.4rem;
      font-weight: 700;
    }

    .subtitle {
      font-size: 0.95rem;
      color: #999;
      margin-bottom: 2rem;
    }

    .buttons {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
      min-height: 80px;
    }

    button {
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-weight: 700;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    #yes-btn {
      background: linear-gradient(135deg, #ff6eb4, #ff3e8c);
      color: white;
      padding: 14px 32px;
      font-size: 1.1rem;
      box-shadow: 0 6px 20px rgba(255, 62, 140, 0.35);
    }

    #yes-btn:hover {
      transform: scale(1.07);
      box-shadow: 0 10px 28px rgba(255, 62, 140, 0.5);
    }

    #no-btn {
      background: #f0f0f0;
      color: #888;
      padding: 12px 26px;
      font-size: 1rem;
    }

    #no-btn:hover { background: #e0e0e0; }

    .hurray {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
      animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    @keyframes popIn {
      0%   { transform: scale(0.4); opacity: 0; }
      100% { transform: scale(1);   opacity: 1; }
    }

    .hurray-emoji { font-size: 4rem; }

    .hurray h2 {
      font-size: 2rem;
      color: #d63384;
      font-weight: 800;
    }

    .hurray p {
      font-size: 1rem;
      color: #e75480;
    }

    .no-counter {
      font-size: 0.78rem;
      color: #ccc;
      margin-top: 1.2rem;
    }
  </style>
</head>
<body>

  <div class="hearts-bg" id="hearts-bg"></div>

  <div class="card" id="card">
    <span class="bear">🐻</span>
    <h1>I LIKE YOU, 
      DO YOU LIKE ME TOOO? 💖</h1>
    <p class="subtitle">Think carefully... but not too carefully 😜</p>

    <div class="buttons" id="buttons">
      <button id="yes-btn" onclick="sayYes()">Yes 💕</button>
      <button id="no-btn" onclick="sayNo()">No</button>
    </div>

    <div class="hurray" id="hurray">
      <div class="hurray-emoji">🎉💖🎊</div>
      <h2>Hurray!!</h2>
      <p>You just made me the happiest person ever! 😍</p>
    </div>

    <p class="no-counter" id="no-counter"></p>
  </div>

  <script>
    let noCount = 0;
    let yesSize = 1;

    const messages = [
      "Are you sure? 🥺",
      "Please reconsider! 🙏",
      "Wrong button! 😅",
      "C'mon... 😢",
      "Just press YES! 😭",
      "Your heart says YES! 💓",
      "Last chance... 👀",
      "Really?? 😤",
      "I won't give up! 💪",
      "PLEASEEE 🥺🥺🥺"
    ];

    function sayNo() {
      noCount++;
      yesSize += 0.22;
      const yesBtn = document.getElementById('yes-btn');
      yesBtn.style.transform = `scale(${yesSize})`;
      yesBtn.style.transition = 'transform 0.3s cubic-bezier(0.34,1.56,0.64,1)';

      const msg = messages[Math.min(noCount - 1, messages.length - 1)];
      document.getElementById('no-counter').textContent = msg;

      if (noCount >= 6) {
        const noBtn = document.getElementById('no-btn');
        noBtn.style.fontSize = `${Math.max(6, 16 - noCount * 1.5)}px`;
        noBtn.style.opacity = `${Math.max(0.1, 1 - noCount * 0.1)}`;
      }
    }

    function sayYes() {
      document.getElementById('buttons').style.display = 'none';
      document.getElementById('no-counter').style.display = 'none';
      document.querySelector('.subtitle').style.display = 'none';
      document.querySelector('h1').style.display = 'none';
      document.querySelector('.bear').style.display = 'none';

      const h = document.getElementById('hurray');
      h.style.display = 'flex';

      launchConfetti();
    }

    function launchConfetti() {
      const bg = document.getElementById('hearts-bg');
      const emojis = ['💖','💗','💓','💕','🌸','✨','🎉','💝'];
      for (let i = 0; i < 30; i++) {
        const el = document.createElement('div');
        el.className = 'floating-heart';
        el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        el.style.left = Math.random() * 100 + 'vw';
        el.style.animationDelay = (Math.random() * 3) + 's';
        el.style.animationDuration = (4 + Math.random() * 4) + 's';
        el.style.fontSize = (1 + Math.random() * 2) + 'rem';
        bg.appendChild(el);
      }
    }

    (function initHearts() {
      const bg = document.getElementById('hearts-bg');
      for (let i = 0; i < 12; i++) {
        const el = document.createElement('div');
        el.className = 'floating-heart';
        el.textContent = '💖';
        el.style.left = Math.random() * 100 + 'vw';
        el.style.animationDelay = (Math.random() * 6) + 's';
        el.style.animationDuration = (5 + Math.random() * 5) + 's';
        bg.appendChild(el);
      }
    })();
  </script>
</body>
</html>
